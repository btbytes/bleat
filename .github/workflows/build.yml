name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "bleat $VERSION" \
              --generate-notes \
              --draft=false
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SOURCE_URL="https://github.com/btbytes/bleat/archive/refs/tags/v${VERSION}.tar.gz"
          SOURCE_SHA=$(curl -sL "$SOURCE_URL" | shasum -a 256 | awk '{print $1}')

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          TAP_REPO="homebrew-brew"

          TMPDIR=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/btbytes/$TAP_REPO.git" "$TMPDIR"
          cd "$TMPDIR"

          mkdir -p Formula

          cat > Formula/bleat.rb << "EOF"
class Bleat < Formula
  desc "Find what's running on your ports"
  homepage "https://github.com/btbytes/bleat"
  version "$VERSION"

  url "$SOURCE_URL"
  sha256 "$SOURCE_SHA"

  depends_on "go" => :build

  def install
    system "go", "build", *std_go_args(ldflags: "-s -w"), "."
  end

  test do
    system "#{bin}/bleat", "--help"
  end
end
EOF

          if git diff --quiet HEAD -- Formula/bleat.rb 2>/dev/null && [ -z "$(git status --porcelain Formula/bleat.rb 2>/dev/null)" ]; then
            echo "Formula unchanged, skipping commit"
            exit 0
          fi

          git add Formula/bleat.rb
          git commit -m "Update bleat to $VERSION"
          git push origin main

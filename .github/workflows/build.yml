name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Read version
        id: version
        run: |
          MAJOR_MINOR=$(cat VERSION)
          PATCH=${{ github.run_number }}
          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build all platforms
        run: |
          make release
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create release archives
        run: |
          mkdir -p release-tar
          for f in release/bleat-*; do
            BASENAME=$(basename "$f")
            cp "$f" "release-tar/bleat"
            tar czf "release-tar/${BASENAME}.tar.gz" -C release-tar bleat
            rm release-tar/bleat
          done
          ls -la release-tar/

      - uses: actions/upload-artifact@v4
        with:
          name: bleat-binaries
          path: release-tar/*.tar.gz

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber release-tar/*.tar.gz
          else
            gh release create "$TAG" \
              --title "Build $VERSION" \
              --generate-notes \
              release-tar/*.tar.gz
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DARWIN_ARM64_URL="https://github.com/btbytes/bleat/releases/download/v${VERSION}/bleat-darwin-arm64.tar.gz"
          DARWIN_AMD64_URL="https://github.com/btbytes/bleat/releases/download/v${VERSION}/bleat-darwin-amd64.tar.gz"
          LINUX_AMD64_URL="https://github.com/btbytes/bleat/releases/download/v${VERSION}/bleat-linux-amd64.tar.gz"
          LINUX_ARM64_URL="https://github.com/btbytes/bleat/releases/download/v${VERSION}/bleat-linux-arm64.tar.gz"

          DARWIN_ARM64_SHA=$(curl -sL "$DARWIN_ARM64_URL" | shasum -a 256 | awk '{print $1}')
          DARWIN_AMD64_SHA=$(curl -sL "$DARWIN_AMD64_URL" | shasum -a 256 | awk '{print $1}')
          LINUX_AMD64_SHA=$(curl -sL "$LINUX_AMD64_URL" | shasum -a 256 | awk '{print $1}')
          LINUX_ARM64_SHA=$(curl -sL "$LINUX_ARM64_URL" | shasum -a 256 | awk '{print $1}')

          export DARWIN_ARM64_SHA DARWIN_AMD64_SHA LINUX_AMD64_SHA LINUX_ARM64_SHA
          FORMULA=$(bash .github/scripts/update-formula.sh "$VERSION" "$DARWIN_ARM64_URL" "$DARWIN_AMD64_URL" "$LINUX_AMD64_URL" "$LINUX_ARM64_URL")

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          TAP_REPO="homebrew-brew"

          TMPDIR=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/btbytes/$TAP_REPO.git" "$TMPDIR"
          cd "$TMPDIR"

          mkdir -p Formula
          echo "$FORMULA" > Formula/bleat.rb

          if git diff --quiet HEAD -- Formula/bleat.rb 2>/dev/null && [ -z "$(git status --porcelain Formula/bleat.rb 2>/dev/null)" ]; then
            echo "Formula unchanged, skipping commit"
            exit 0
          fi

          git add Formula/bleat.rb
          git commit -m "Update bleat to $VERSION"
          git push origin main
